<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Cubamant - Register</title>

    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet"/>
    <script src="https://kit.fontawesome.com/17e9292b04.js" crossorigin="anonymous"></script>

    <style>
        body {
          font-family: "Roboto", sans-serif;
          background-color: #1c3955;
          color: #306da6;
        }

        .form-container {
          display: flex;
          flex-direction: column;
          align-items: center;
          width: 320px;
          margin: 50px auto;
          padding: 20px;
          box-shadow: 0 0 6px #e7f6ff;
          border-radius: 10px;
          background-color: #e7f6ff;
        }

        .form-group {
          width: 100%;
          margin-bottom: 15px;
        }

        .form-group input {
          width: 100%;
          height: 40px;
          border-radius: 13px;
          border: 1px solid #ffffff;
          box-shadow: 0 0 4px #306da6;
          padding-left: 10px;
        }

        .form-group button {
          width: 100%;
          height: 40px;
          border-radius: 10px;
          background-color: #306da6;
          color: white;
          border: none;
          cursor: pointer;
        }

        .form-group button:hover {
          background-color: #24517a;
        }

        .button-like {
          margin-top: 10px;
          text-align: center;
          display: block;
          width: 100%;
          background-color: #306da6;
          color: white;
          padding: 10px;
          border-radius: 10px;
          text-decoration: none;
        }
    </style>
</head>

<body>

<div class="form-container">
    <h2>Register - Cubamant</h2>

    <p th:if="${userExists}" style="color:red;">
        Email already exists!
    </p>

    <form th:object="${request}"
          th:action="@{/signup}"
          method="post">

        <div class="form-group">
            <input type="text" placeholder="First Name" th:field="*{firstName}" required/>
        </div>

        <div class="form-group">
            <input type="text" placeholder="Last Name" th:field="*{lastName}" required/>
        </div>

        <div class="form-group">
            <input type="email" placeholder="Email" th:field="*{email}" required/>
        </div>

        <div class="form-group">
            <input type="password" placeholder="Password" th:field="*{password}" required/>
        </div>
        <div class="form-group">
            <input type="password" placeholder="Password" th:field="*{confirmPassword}" required/>
        </div>

        <div class="form-group">
            <button type="submit">Create Account</button>
        </div>

    </form>

    <a href="/signin" class="button-like">
        Already have an account? Sign in
    </a>
</div>

</body>
</html>
