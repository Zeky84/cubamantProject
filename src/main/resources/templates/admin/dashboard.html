<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - CubaMant</title>
</head>
<body>
<h1>Admin Dashboard</h1>

<div>
    <p>Welcome, <span th:text="${adminEmail}">admin</span>!</p>
    <form th:action="@{/logout}" method="post">
        <button type="submit">Logout</button>
    </form>
</div>

<h2>All Users</h2>

<div th:if="${users != null and !users.isEmpty()}">
    <table border="1">
        <thead>
        <tr>
            <th>ID</th>
            <th>Email</th>
            <th>First Name</th>
            <th>Last Name</th>
            <th>Active</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="user : ${users}">
            <td th:text="${user.id}">1</td>
            <td th:text="${user.email}">email@example.com</td>
            <td th:text="${user.firstName}">John</td>
            <td th:text="${user.lastName}">Doe</td>
            <td th:text="${user.isActive ? 'Yes' : 'No'}">Yes</td>
            <td>
                <form th:action="@{/admin/users/{id}/delete(id=${user.id})}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button type="submit">Delete</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</div>

<div th:if="${users == null or users.isEmpty()}">
    <p>No users found.</p>
</div>
</body>
</html>
