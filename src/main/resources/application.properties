spring.application.name=cubamant
# PostgreSQL Connection
spring.datasource.url=jdbc:postgresql://localhost:5432/cubamant_db
spring.datasource.username=postgres
spring.datasource.password=zeky1984
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate / JPA
#in production, consider using 'none' or 'validate' to prevent unintended schema changes
spring.jpa.hibernate.ddl-auto= validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

#Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true